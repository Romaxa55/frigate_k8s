apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frigate
  namespace: frigate
  labels:
    release: rancher-monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: frigate
      app.kubernetes.io/name: frigate
  namespaceSelector:
    matchNames:
      - frigate
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
