replicaCount: 1
image:
  repository: ghcr.io/blakeblackshear/frigate
  pullPolicy: Always
  tag: "8d05e7c"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
securityContext:
  privileged: true
service:
  type: ClusterIP
  port: 80
storage:
  enabled: true
  size: 100Gi
  storageClass: local-path
  configSize: 100Mi
hwaccel:
  intelEnabled: true
  usbEnabled: false
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://traefik-auth.default.svc.cluster.local/api/v1/auth/vouch"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.rubystay.vn/?continue=https://webcams.rubystay.vn"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-User-Id, X-Auth-User, X-Auth-Email"
  hosts:
    - host: frigate.lan
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: webcams.rubystay.vn
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
resources:
  requests:
    memory: "2Gi"  # Увеличили минимальный запрос памяти
    cpu: "1"    # Больше CPU для стабильной работы
  limits:
    memory: "8Gi"  # Максимум до 16 ГБ
    cpu: "2"    # До 8 ядер
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
secrets: []
