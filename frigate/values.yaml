replicaCount: 1
image:
  repository: ghcr.io/blakeblackshear/frigate
  pullPolicy: Always
  tag: "0.14.1"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext: {}
securityContext:
  privileged: true
service:
  type: ClusterIP
  port: 80
storage:
  enabled: true
  size: 100Gi
  storageClass: local-path
  configSize: 100Mi
hwaccel:
  intelEnabled: true
  usbEnabled: false
ingress:
  enabled: true
  className: "traefik"
  annotations:
    ingress.kubernetes.io/router.entrypoints: web
    ingress.kubernetes.io/router.middlewares: frigate-auth-middleware@kubernetescrd
  hosts:
    - host: frigate.lan
      paths:
        - path: /
          pathType: ImplementationSpecific
#    - host: webcams.rubystay.vn
#      paths:
#        - path: /
#          pathType: ImplementationSpecific
  tls: []
resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "2000m"
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
secrets: []
